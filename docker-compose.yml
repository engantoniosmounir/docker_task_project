version: "3.9"

services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./static:/static
    depends_on:
      - flask1
      - flask2

  flask1:
    build: .
    environment:
      SERVER_NAME: flask1
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  flask2:
    build: .
    environment:
      SERVER_NAME: flask2
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine

volumes:
  pgdata: